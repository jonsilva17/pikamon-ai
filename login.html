<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pikamon - Login & Registo</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; padding: 50px; text-align: center; color: #333; }
        .container { display: flex; justify-content: center; flex-wrap: wrap; gap: 40px; margin-top: 30px; }
        .box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0px 6px 15px rgba(0,0,0,0.1); width: 320px; box-sizing: border-box; }
        h1 { color: #0056b3; }
        h2 { margin-bottom: 20px; color: #444; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; transition: background 0.2s; }
        button:hover { background-color: #0056b3; }
        .btn-reg { background-color: #28a745; }
        .btn-reg:hover { background-color: #218838; }
        .msg { margin-top: 15px; font-weight: bold; min-height: 20px; }
        .voltar { display: inline-block; margin-top: 20px; color: #666; text-decoration: none; }
        .voltar:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <h1>Bem-vindo ao Pikamon AI 🦖</h1>
    <p>Cria uma conta para guardares todas as tuas equipas geradas automaticamente!</p>
    
    <div class="container">
        <div class="box">
            <h2>Entrar</h2>
            <form id="loginForm">
                <input type="text" id="loginUser" placeholder="Nome de Utilizador" required>
                <input type="password" id="loginPass" placeholder="Password" required>
                <button type="submit">Entrar</button>
            </form>
            <div id="loginMsg" class="msg"></div>
        </div>

        <div class="box">
            <h2>Criar Conta</h2>
            <form id="registerForm">
                <input type="text" id="regUser" placeholder="Escolhe um Utilizador" required>
                <input type="password" id="regPass" placeholder="Escolhe uma Password" required>
                <button type="submit" class="btn-reg">Registar</button>
            </form>
            <div id="registerMsg" class="msg"></div>
        </div>
    </div>

    <br>
    <a href="index.html" class="voltar">← Voltar ao Gerador Sem Conta</a>

    <script>
        // Aponta diretamente para o teu Python ativo na porta 5000
        const API_URL = "https://pikamon-ai.onrender.com";

        // --- REGISTO ---
        document.getElementById("registerForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const username = document.getElementById("regUser").value;
            const password = document.getElementById("regPass").value;
            const msg = document.getElementById("registerMsg");

            msg.style.color = "orange";
            msg.innerText = "A criar conta...";

            try {
                const res = await fetch(`${API_URL}/register`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                
                if (res.ok) {
                    msg.style.color = "green";
                    msg.innerText = data.message;
                    document.getElementById("registerForm").reset();
                } else {
                    msg.style.color = "red";
                    msg.innerText = data.error || "Erro ao registar.";
                }
            } catch (err) {
                msg.style.color = "red";
                msg.innerText = "Erro ao ligar ao servidor backend.";
            }
        });

        // --- LOGIN ---
        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const username = document.getElementById("loginUser").value;
            const password = document.getElementById("loginPass").value;
            const msg = document.getElementById("loginMsg");

            msg.style.color = "orange";
            msg.innerText = "A verificar...";

            try {
                const res = await fetch(`${API_URL}/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                
                if (res.ok) {
                    msg.style.color = "green";
                    msg.innerText = data.message;
                    localStorage.setItem("utilizadorLogado", data.user);
                    setTimeout(() => {
                        window.location.href = "index.html";
                    }, 1200);
                } else {
                    msg.style.color = "red";
                    msg.innerText = data.error || "Credenciais incorretas.";
                }
            } catch (err) {
                msg.style.color = "red";
                msg.innerText = "Erro ao ligar ao servidor backend.";
            }
        });
    </script>
</body>
</html>
